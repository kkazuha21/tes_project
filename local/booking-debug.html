<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约功能调试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-success {
            background: #4caf50;
            color: white;
            margin-left: 10px;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-height: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: #4caf50;
            font-weight: bold;
        }
        .error {
            color: #f44336;
            font-weight: bold;
        }
        .info {
            color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 预约功能调试工具</h1>

        <!-- 步骤 1: 登录 -->
        <div class="section">
            <h2>步骤 1: 登录获取 Token</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" value="student1">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" value="123456">
            </div>
            <button class="btn-primary" onclick="login()">登录</button>
            <div id="login-result" class="result" style="display:none;"></div>
        </div>

        <!-- 步骤 2: 获取设备列表 -->
        <div class="section">
            <h2>步骤 2: 获取设备列表</h2>
            <button class="btn-primary" onclick="getDevices()">获取设备</button>
            <div id="devices-result" class="result" style="display:none;"></div>
        </div>

        <!-- 步骤 3: 创建预约 -->
        <div class="section">
            <h2>步骤 3: 创建预约</h2>
            <div class="form-group">
                <label>设备 ID</label>
                <input type="number" id="deviceId" value="13">
            </div>
            <div class="form-group">
                <label>开始时间</label>
                <input type="datetime-local" id="startTime">
            </div>
            <div class="form-group">
                <label>结束时间</label>
                <input type="datetime-local" id="endTime">
            </div>
            <button class="btn-primary" onclick="createBooking()">创建预约</button>
            <button class="btn-success" onclick="setDefaultTimes()">使用默认时间</button>
            <div id="booking-result" class="result" style="display:none;"></div>
        </div>

        <!-- 步骤 4: 查看预约列表 -->
        <div class="section">
            <h2>步骤 4: 查看我的预约</h2>
            <button class="btn-primary" onclick="getMyBookings()">获取我的预约</button>
            <div id="mybookings-result" class="result" style="display:none;"></div>
        </div>

        <!-- 步骤 5: 前端测试 -->
        <div class="section">
            <h2>步骤 5: 在前端测试</h2>
            <p style="color: #666; margin-bottom: 15px;">
                1. 点击下面的按钮打开前端<br>
                2. 使用 student1/123456 登录<br>
                3. 进入"设备列表"，点击任意设备<br>
                4. 在设备详情页尝试预约<br>
                5. 打开浏览器控制台 (F12) 查看错误信息
            </p>
            <button class="btn-success" onclick="window.open('http://localhost:5173/index.html', '_blank')">打开前端</button>
        </div>
    </div>

    <script>
        let token = null;

        // 设置默认时间（明天 10:00 - 12:00）
        function setDefaultTimes() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const startTime = new Date(tomorrow);
            startTime.setHours(10, 0, 0, 0);
            
            const endTime = new Date(tomorrow);
            endTime.setHours(12, 0, 0, 0);
            
            document.getElementById('startTime').value = formatDateTimeLocal(startTime);
            document.getElementById('endTime').value = formatDateTimeLocal(endTime);
        }

        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        function formatISO(dateTimeLocal) {
            return dateTimeLocal + ':00';
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('login-result');
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在登录...';

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    resultDiv.innerHTML = `<span class="success">✓ 登录成功！</span>\n\n` +
                        `用户名: ${data.username}\n` +
                        `角色: ${data.role}\n` +
                        `用户ID: ${data.userId}\n\n` +
                        `Token: ${token.substring(0, 50)}...`;
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ 登录失败</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 请求失败</span>\n\n${error.message}`;
            }
        }

        async function getDevices() {
            if (!token) {
                alert('请先登录！');
                return;
            }

            const resultDiv = document.getElementById('devices-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在获取设备列表...';

            try {
                const response = await fetch('http://localhost:8080/api/devices', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">✓ 获取成功！</span>\n\n共 ${data.length} 台设备:\n\n`;
                    data.forEach(device => {
                        resultDiv.innerHTML += `ID: ${device.id} | ${device.name} | ${device.status} | ${device.location}\n`;
                    });
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ 获取失败</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 请求失败</span>\n\n${error.message}`;
            }
        }

        async function createBooking() {
            if (!token) {
                alert('请先登录！');
                return;
            }

            const deviceId = parseInt(document.getElementById('deviceId').value);
            const startTime = formatISO(document.getElementById('startTime').value);
            const endTime = formatISO(document.getElementById('endTime').value);

            if (!startTime || !endTime) {
                alert('请选择开始和结束时间！');
                return;
            }

            const resultDiv = document.getElementById('booking-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在创建预约...';

            const bookingData = {
                deviceId: deviceId,
                startTime: startTime,
                endTime: endTime
            };

            resultDiv.innerHTML += `\n\n<span class="info">请求数据:</span>\n${JSON.stringify(bookingData, null, 2)}`;

            try {
                const response = await fetch('http://localhost:8080/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(bookingData)
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML += `\n\n<span class="success">✓ 预约创建成功！</span>\n\n` +
                        `预约ID: ${data.id}\n` +
                        `设备: ${data.deviceName}\n` +
                        `开始时间: ${data.startTime}\n` +
                        `结束时间: ${data.endTime}\n` +
                        `状态: ${data.status}`;
                } else {
                    resultDiv.innerHTML += `\n\n<span class="error">✗ 创建失败</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML += `\n\n<span class="error">✗ 请求失败</span>\n\n${error.message}`;
            }
        }

        async function getMyBookings() {
            if (!token) {
                alert('请先登录！');
                return;
            }

            const resultDiv = document.getElementById('mybookings-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在获取预约列表...';

            try {
                const response = await fetch('http://localhost:8080/api/bookings/my', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">✓ 获取成功！</span>\n\n共 ${data.length} 条预约:\n\n`;
                    data.forEach(booking => {
                        resultDiv.innerHTML += `ID: ${booking.id} | 设备: ${booking.device?.name} | ` +
                            `时间: ${booking.startTime} - ${booking.endTime} | 状态: ${booking.status}\n`;
                    });
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ 获取失败</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 请求失败</span>\n\n${error.message}`;
            }
        }

        // 页面加载时设置默认时间
        window.onload = function() {
            setDefaultTimes();
        };
    </script>
</body>
</html>
