<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能测试 - 共享实验室平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .test-section h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.success {
            background: #4caf50;
            color: white;
        }
        .status.warning {
            background: #ff9800;
            color: white;
        }
        .status.error {
            background: #f44336;
            color: white;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-success {
            background: #4caf50;
            color: white;
        }
        .btn-success:hover {
            background: #45a049;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }
        .account-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .account-card h3 {
            color: #667eea;
            margin-bottom: 8px;
        }
        .account-info {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .info-item {
            color: #666;
        }
        .info-item strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 共享实验室平台 - 功能测试</h1>
        <p class="subtitle">测试所有 API 端点和前端路由</p>

        <!-- 测试账号 -->
        <div class="test-section">
            <h2>👥 测试账号</h2>
            <div class="account-card">
                <h3>管理员账号</h3>
                <div class="account-info">
                    <div class="info-item"><strong>用户名:</strong> admin</div>
                    <div class="info-item"><strong>密码:</strong> 123456</div>
                    <div class="info-item"><strong>角色:</strong> ADMIN</div>
                </div>
                <button class="btn btn-primary" onclick="testLogin('admin', '123456')">测试登录</button>
                <button class="btn btn-success" onclick="window.open('http://localhost:5173/index.html', '_blank')">打开前端</button>
            </div>

            <div class="account-card">
                <h3>教师账号</h3>
                <div class="account-info">
                    <div class="info-item"><strong>用户名:</strong> teacher1</div>
                    <div class="info-item"><strong>密码:</strong> 123456</div>
                    <div class="info-item"><strong>角色:</strong> TEACHER</div>
                </div>
                <button class="btn btn-primary" onclick="testLogin('teacher1', '123456')">测试登录</button>
            </div>

            <div class="account-card">
                <h3>学生账号</h3>
                <div class="account-info">
                    <div class="info-item"><strong>用户名:</strong> student1</div>
                    <div class="info-item"><strong>密码:</strong> 123456</div>
                    <div class="info-item"><strong>角色:</strong> STUDENT</div>
                </div>
                <button class="btn btn-primary" onclick="testLogin('student1', '123456')">测试登录</button>
            </div>
        </div>

        <!-- API 测试 -->
        <div class="test-section">
            <h2>🔌 API 端点测试</h2>
            <button class="btn btn-primary" onclick="testDevices()">测试设备列表</button>
            <button class="btn btn-primary" onclick="testBookings()">测试预约列表</button>
            <button class="btn btn-primary" onclick="testTickets()">测试报修列表</button>
            <button class="btn btn-success" onclick="runAllTests()">运行所有测试</button>
            <div id="api-result" class="result" style="display:none;"></div>
        </div>

        <!-- 前端路由测试 -->
        <div class="test-section">
            <h2>🗺️ 前端路由测试</h2>
            <p style="margin-bottom: 15px; color: #666;">点击下面的按钮在新标签页中打开对应的路由（需要先登录）</p>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/student/devices', '_blank')">学生 - 设备列表</button>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/student/bookings', '_blank')">学生 - 我的预约</button>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/student/tickets', '_blank')">学生 - 我的报修</button>
            <br>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/teacher/devices', '_blank')">教师 - 设备管理</button>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/teacher/bookings', '_blank')">教师 - 预约管理</button>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/teacher/tickets', '_blank')">教师 - 报修处理</button>
            <br>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/admin/dashboard', '_blank')">管理员 - 仪表盘</button>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/admin/devices', '_blank')">管理员 - 设备管理</button>
            <button class="btn btn-primary" onclick="window.open('http://localhost:5173/index.html#/admin/users', '_blank')">管理员 - 用户管理</button>
        </div>

        <!-- 测试结果 -->
        <div class="test-section" id="test-results" style="display:none;">
            <h2>📊 测试结果</h2>
            <div id="results-content" class="result"></div>
        </div>
    </div>

    <script>
        let currentToken = null;

        async function testLogin(username, password) {
            const resultDiv = document.getElementById('api-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在测试登录...';

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    currentToken = data.token;
                    resultDiv.innerHTML = `<span style="color: #4caf50">✓ 登录成功！</span><br><br>
                        <strong>用户信息:</strong><br>
                        用户名: ${data.username}<br>
                        邮箱: ${data.email}<br>
                        角色: ${data.role}<br>
                        用户ID: ${data.userId}<br><br>
                        <strong>Token:</strong><br>${data.token.substring(0, 50)}...`;
                } else {
                    resultDiv.innerHTML = `<span style="color: #f44336">✗ 登录失败</span><br>${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span style="color: #f44336">✗ 请求失败</span><br>${error.message}`;
            }
        }

        async function testDevices() {
            if (!currentToken) {
                alert('请先登录！');
                return;
            }

            const resultDiv = document.getElementById('api-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在获取设备列表...';

            try {
                const response = await fetch('http://localhost:8080/api/devices', {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<span style="color: #4caf50">✓ 获取设备列表成功！</span><br><br>
                        <strong>共 ${data.length} 台设备:</strong><br><br>`;
                    data.forEach(device => {
                        resultDiv.innerHTML += `${device.name} - ${device.status} - ${device.location}<br>`;
                    });
                } else {
                    resultDiv.innerHTML = `<span style="color: #f44336">✗ 获取失败</span><br>${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span style="color: #f44336">✗ 请求失败</span><br>${error.message}`;
            }
        }

        async function testBookings() {
            if (!currentToken) {
                alert('请先登录！');
                return;
            }

            const resultDiv = document.getElementById('api-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在获取预约列表...';

            try {
                const response = await fetch('http://localhost:8080/api/bookings/my', {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<span style="color: #4caf50">✓ 获取预约列表成功！</span><br><br>
                        <strong>共 ${data.length} 条预约记录</strong><br>`;
                    if (data.length > 0) {
                        resultDiv.innerHTML += `<br>${JSON.stringify(data[0], null, 2)}`;
                    }
                } else {
                    resultDiv.innerHTML = `<span style="color: #f44336">✗ 获取失败</span><br>${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span style="color: #f44336">✗ 请求失败</span><br>${error.message}`;
            }
        }

        async function testTickets() {
            if (!currentToken) {
                alert('请先登录！');
                return;
            }

            const resultDiv = document.getElementById('api-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在获取报修列表...';

            try {
                const response = await fetch('http://localhost:8080/api/tickets/my', {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<span style="color: #4caf50">✓ 获取报修列表成功！</span><br><br>
                        <strong>共 ${data.length} 条报修记录</strong>`;
                } else {
                    resultDiv.innerHTML = `<span style="color: #f44336">✗ 获取失败</span><br>${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span style="color: #f44336">✗ 请求失败</span><br>${error.message}`;
            }
        }

        async function runAllTests() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '正在运行所有测试...<br><br>';

            // 测试管理员登录
            resultDiv.innerHTML += '1. 测试管理员登录...<br>';
            await testLogin('admin', '123456');
            await new Promise(resolve => setTimeout(resolve, 1000));

            // 测试设备列表
            resultDiv.innerHTML += '<br>2. 测试设备列表...<br>';
            await testDevices();
            await new Promise(resolve => setTimeout(resolve, 1000));

            // 测试预约列表
            resultDiv.innerHTML += '<br>3. 测试预约列表...<br>';
            await testBookings();

            resultDiv.innerHTML += '<br><br><span style="color: #4caf50; font-size: 16px;">✓ 所有测试完成！</span>';
        }
    </script>
</body>
</html>
